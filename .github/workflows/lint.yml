name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck (bash scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --version

      # SC1090/SC1091: dynamic `source` paths (user home, profile dirs) cannot be followed at lint time.
      # SC2034: shell profiles export vars read by interactive sessions, not by the script itself.
      # SC2312: "invoke separately to avoid masking" is overly noisy for profile code.
      - name: ShellCheck all bash scripts (strict)
        env:
          SHELLCHECK_OPTS: >-
            --severity=style
            --enable=all
            --external-sources
            --exclude=SC1090,SC1091,SC2034,SC2312
        run: |
          set -e
          shellcheck --shell=bash install.sh
          shellcheck --shell=bash shells/bashrc
          shellcheck --shell=bash optimize/ubuntu.sh
          shellcheck --shell=bash optimize/macos.sh
          shellcheck --shell=bash optimize/android.sh

  zsh-parse:
    name: zsh parse-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Parse-check shells/zshrc
        run: zsh -n shells/zshrc
      - name: Best-effort shellcheck on zshrc (soft fail)
        continue-on-error: true
        run: |
          sudo apt-get install -y shellcheck
          shellcheck --shell=bash --exclude=SC1090,SC1091,SC2034,SC2296,SC2298,SC2299,SC2300 shells/zshrc || true

  bash-parse:
    name: bash parse-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Parse-check every shell script
        run: |
          set -e
          bash -n install.sh
          bash -n shells/bashrc
          for f in optimize/*.sh; do bash -n "$f"; done

  pwsh-analyzer:
    name: PSScriptAnalyzer (strict)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
      - name: Analyze PowerShell files at Warning + Error
        shell: pwsh
        run: |
          $files = @('shells/windows.ps1', 'optimize/windows.ps1')
          # Rules we intentionally opt out of:
          #   PSAvoidUsingWriteHost       — doctor output is user-facing console color
          #   PSUseShouldProcessForStateChangingFunctions — functions already confirm interactively
          #   PSAvoidUsingInvokeExpression — required for eval-style fix strings
          #   PSUseApprovedVerbs           — helper names like `doctor`, `install` are user commands
          #   PSAvoidGlobalVars            — profile scripts use globals by design
          $exclude = @(
            'PSAvoidUsingWriteHost',
            'PSUseShouldProcessForStateChangingFunctions',
            'PSAvoidUsingInvokeExpression',
            'PSUseApprovedVerbs',
            'PSAvoidGlobalVars'
          )
          $results = Invoke-ScriptAnalyzer -Path $files -Severity Warning,Error -ExcludeRule $exclude -Recurse
          if ($results) {
            $results | Format-Table -AutoSize -Wrap
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)"
            exit 1
          }
          Write-Host "PSScriptAnalyzer: clean"

  pwsh-parse-51:
    name: PowerShell 5.1 parse-check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Tokenize with Windows PowerShell 5.1
        shell: powershell
        run: |
          $files = @('shells/windows.ps1', 'optimize/windows.ps1')
          $fail = $false
          foreach ($f in $files) {
            $errors = $null
            $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw $f), [ref]$errors)
            if ($errors -and $errors.Count -gt 0) {
              Write-Host "FAIL: $f"
              $errors | Format-List
              $fail = $true
            } else {
              Write-Host "OK:   $f"
            }
          }
          if ($fail) { exit 1 }
      - name: Reject non-ASCII characters in PS files
        shell: pwsh
        run: |
          $bad = @()
          foreach ($f in @('shells/windows.ps1', 'optimize/windows.ps1')) {
            $content = Get-Content -Raw $f
            $matches = [regex]::Matches($content, '[^\x00-\x7F]')
            if ($matches.Count -gt 0) {
              $bad += "$f : $($matches.Count) non-ASCII character(s)"
            }
          }
          if ($bad.Count -gt 0) {
            $bad | ForEach-Object { Write-Error $_ }
            exit 1
          }
          Write-Host "All PS files are ASCII-clean"

  editorconfig:
    name: EditorConfig
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: editorconfig-checker
        uses: editorconfig-checker/action-editorconfig-checker@main

  actionlint:
    name: actionlint (workflow files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  doctor-smoke-ubuntu:
    name: doctor smoke test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Source bashrc and invoke doctor
        shell: bash
        run: |
          # Sanity: profile sources cleanly and `doctor` is callable.
          # Failures in individual checks are expected on a bare CI runner,
          # so we only assert the function loads and runs without a bash error.
          set +e
          # shellcheck disable=SC1091
          source shells/bashrc 2>/dev/null
          type doctor >/dev/null || { echo "doctor function not defined"; exit 1; }
          doctor >/tmp/doctor.out 2>&1
          code=$?
          echo "doctor exit=$code"
          head -80 /tmp/doctor.out
          # doctor returns the error count; just assert it ran (no bash fatal)
          exit 0
